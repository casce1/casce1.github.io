<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="./firebase-config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
    <title>管理員A</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f6f8;
        }
        .card {
            background: #fff;
            border-radius: 10px;
            border: 1px solid #e2e2e2;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            padding: 16px;
        }
        .toolbar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .submit-btn {
            background-color: #0066cc;
            color: white;
            border: none;
            padding: 9px 14px;
            border-radius: 6px;
            cursor: pointer;
        }
        .submit-btn:hover { background-color: #004c99; }
        .submit-btn.secondary {
            background: #eef5ff;
            color: #0d4a94;
        }
        .submit-btn.secondary:hover { background: #dcecff; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1.6fr;
            gap: 14px;
        }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; margin-bottom: 4px; font-weight: 600; }
        .input-group input, .input-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .record-list { margin-top: 8px; }
        .table-wrapper {
            overflow-x: auto;
            background: #fff;
            border: 1px solid #d8d8d8;
            border-radius: 6px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 760px;
        }
        th, td {
            padding: 9px;
            border-bottom: 1px solid #ececec;
            text-align: left;
            vertical-align: top;
        }
        th {
            background: #f8fbff;
            white-space: nowrap;
        }
        tr.clickable-row { cursor: pointer; }
        tr.clickable-row:hover { background: #f5f9ff; }
        tr.selected-row { background: #eaf3ff; }
        .status-pill {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-visible { background: #e8f7ee; color: #1d7a3a; }
        .status-hidden { background: #fbeaea; color: #9b1c1c; }
        .pagination { margin-top: 12px; text-align: center; }
        .pagination button { margin: 0 5px; }
        .loading-indicator { margin-top: 8px; color: #444; font-size: 14px; }
        #main-container { display: none; }
        @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="login-container" class="card">
        <h2>RESTRICTED AREA</h2>
        <button class="submit-btn" onclick="googleLogin()">Sign in</button>
    </div>

    <div id="main-container">
        <div class="card" style="margin-bottom: 14px;">
            <div class="toolbar">
                <button class="submit-btn secondary" onclick="setPanel('create')">新增資料</button>
                <button class="submit-btn secondary" onclick="setPanel('update')">更新資料</button>
                <button class="submit-btn" onclick="logout()">登出</button>
            </div>
            <div class="input-group">
                <label for="type-select">資料類型</label>
                <select id="type-select" onchange="handleTypeChange()">
                    <option value="announcement">公告</option>
                    <option value="training">訓練</option>
                    <option value="services">服務</option>
                    <option value="activities">活動</option>
                </select>
            </div>
        </div>

        <div class="grid">
            <div class="card" id="create-panel">
                <h3>新增</h3>
                <div class="input-group">
                    <label for="c-title">標題</label>
                    <input id="c-title" type="text">
                </div>
                <div class="input-group" id="c-desc-group">
                    <label for="c-desc">描述</label>
                    <input id="c-desc" type="text">
                </div>
                <div class="input-group non-ann">
                    <label for="c-date">日期</label>
                    <input id="c-date" type="text">
                </div>
                <div class="input-group non-ann">
                    <label for="c-time">時間</label>
                    <input id="c-time" type="text">
                </div>
                <div class="input-group non-ann">
                    <label for="c-location">地點</label>
                    <input id="c-location" type="text">
                </div>
                <div class="input-group non-ann">
                    <label for="c-remark">備註1</label>
                    <input id="c-remark" type="text">
                </div>
                <div class="input-group non-ann">
                    <label for="c-remark2">備註2</label>
                    <input id="c-remark2" type="text">
                </div>
                <div class="input-group">
                    <label for="c-expire">有效期至</label>
                    <input id="c-expire" type="text" placeholder="YYYYMMDD">
                </div>
                <button class="submit-btn" onclick="createRecord()">提交新增</button>
            </div>

            <div class="card" id="update-panel" style="display:none;">
                <h3>更新</h3>
                <div class="record-list" id="record-list"></div>
                <div class="pagination" id="pagination"></div>
                <div class="loading-indicator" id="loading-indicator" style="display:none;">讀取中...</div>
                <div id="edit-form" style="display:none; margin-top: 12px;">
                    <div class="input-group">
                        <label for="edit-title">標題</label>
                        <input id="edit-title" type="text">
                    </div>
                    <div class="input-group" id="edit-desc-group">
                        <label for="edit-desc">描述</label>
                        <input id="edit-desc" type="text">
                    </div>
                    <div class="input-group" id="edit-date-group">
                        <label for="edit-date">日期</label>
                        <input id="edit-date" type="text">
                    </div>
                    <div class="input-group" id="edit-time-group">
                        <label for="edit-time">時間</label>
                        <input id="edit-time" type="text">
                    </div>
                    <div class="input-group" id="edit-location-group">
                        <label for="edit-location">地點</label>
                        <input id="edit-location" type="text">
                    </div>
                    <div class="input-group" id="edit-remark-group">
                        <label for="edit-remark">備註</label>
                        <input id="edit-remark" type="text">
                    </div>
                    <div class="input-group" id="edit-remark2-group">
                        <label for="edit-remark2">備註2</label>
                        <input id="edit-remark2" type="text">
                    </div>
                    <div class="input-group">
                        <label for="edit-expire">有效期至</label>
                        <input id="edit-expire" type="text" placeholder="YYYYMMDD">
                    </div>
                    <div class="input-group">
                        <label for="edit-display">顯示狀態</label>
                        <select id="edit-display">
                            <option value="Y">顯示</option>
                            <option value="N">隱藏</option>
                        </select>
                    </div>
                    <button class="submit-btn" onclick="saveChanges()">更新</button>
                    <button class="submit-btn secondary" onclick="cancelEdit()">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const auth = firebase.auth();
        const db = firebase.firestore();
        const PAGE_SIZE = 5;
        const paginationStore = {};
        const COLLECTIONS = Object.freeze({
            announcement: "announcement",
            training: "training",
            services: "services",
            activities: "activities"
        });
        const ALLOWED_HASHES = [
            "c9fa9cbff8a6d8303163cf34c81624b33938758d1c9899c66a6d84b3a980dc0f",
            "67b8d4621b0c28456f018f20572d7d0c23e20449f5bf4942859f798045063b03"
        ];

        let mode = "create";
        let currentType = "announcement";
        let currentPage = 1;
        let selectedRecord = null;
        let isLoading = false;
        let activeLoadToken = 0;

        function setPanel(panel) {
            mode = panel;
            document.getElementById("create-panel").style.display = panel === "create" ? "block" : "none";
            document.getElementById("update-panel").style.display = panel === "update" ? "block" : "none";
            if (panel === "update") {
                currentPage = 1;
                loadRecords(currentType, true);
            }
        }

        function toggleCreateFields() {
            const isAnnouncement = currentType === "announcement";
            document.getElementById("c-desc-group").style.display = isAnnouncement ? "block" : "none";
            document.querySelectorAll(".non-ann").forEach(el => {
                el.style.display = isAnnouncement ? "none" : "block";
            });
        }

        function handleTypeChange() {
            currentType = document.getElementById("type-select").value;
            currentPage = 1;
            selectedRecord = null;
            document.getElementById("edit-form").style.display = "none";
            toggleCreateFields();
            if (mode === "update") loadRecords(currentType, true);
        }

        function getPaginationState(type) {
            if (!paginationStore[type]) paginationStore[type] = { pages: {}, lastDocs: {}, hasNext: {} };
            return paginationStore[type];
        }

        function resetPaginationState(type) {
            paginationStore[type] = { pages: {}, lastDocs: {}, hasNext: {} };
        }

        function setLoading(loading) {
            isLoading = loading;
            document.getElementById("loading-indicator").style.display = loading ? "block" : "none";
            renderPagination();
        }

        async function sha256(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hashBuffer = await crypto.subtle.digest("SHA-256", data);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, "0")).join("");
        }

        async function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                if (!result.user) return;
                const email = (result.user.email || "").toLowerCase().trim();
                const hashedEmail = await sha256(email);
                if (!ALLOWED_HASHES.includes(hashedEmail)) {
                    alert("Access denied: This email is not authorized.");
                    await auth.signOut();
                }
            } catch (error) {
                alert("Google登入失敗: " + error.message);
            }
        }

        auth.onAuthStateChanged(function(user) {
            if (user) {
                document.getElementById("login-container").style.display = "none";
                document.getElementById("main-container").style.display = "block";
                toggleCreateFields();
                setPanel("create");
            } else {
                document.getElementById("login-container").style.display = "block";
                document.getElementById("main-container").style.display = "none";
            }
        });

        async function logout() {
            await auth.signOut();
            window.location.href = "/admin_panel.html";
        }

        async function getNextSeq(collection) {
            const snap = await db.collection(collection).orderBy("seq", "desc").limit(1).get();
            if (snap.empty) return 1;
            const current = Number(snap.docs[0].data().seq || 0);
            return current + 1;
        }

        async function createRecord() {
            const user = auth.currentUser;
            if (!user) return alert("請先登入！");
            const collection = COLLECTIONS[currentType];
            const title = document.getElementById("c-title").value.trim();
            const expire = document.getElementById("c-expire").value.trim();
            if (!title || !expire) return alert("請填寫必要欄位！");

            const payload = {
                seq: await getNextSeq(collection),
                title,
                display: "Y",
                expiry_date_id: expire,
                createdBy: user.uid,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (currentType === "announcement") {
                const desc = document.getElementById("c-desc").value.trim();
                if (!desc) return alert("請填寫描述！");
                payload.desc = desc;
            } else {
                const date = document.getElementById("c-date").value.trim();
                const time = document.getElementById("c-time").value.trim();
                const location = document.getElementById("c-location").value.trim();
                if (!date || !time || !location) return alert("請填寫日期、時間、地點！");
                payload.date = date;
                payload.time = time;
                payload.location = location;
                payload.remark = document.getElementById("c-remark").value.trim();
                payload.remark2 = document.getElementById("c-remark2").value.trim();
            }

            await db.collection(collection).add(payload);
            alert("新增成功！");
            ["c-title", "c-desc", "c-date", "c-time", "c-location", "c-remark", "c-remark2", "c-expire"].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = "";
            });
        }

        async function loadRecords(type = "announcement", forceRefresh = false) {
            const loadToken = ++activeLoadToken;
            currentType = type;
            try {
                setLoading(true);
                if (forceRefresh) resetPaginationState(type);
                const pageState = getPaginationState(type);

                if (!forceRefresh && pageState.pages[currentPage]) {
                    if (loadToken !== activeLoadToken) return [];
                    renderRecords(pageState.pages[currentPage], type);
                    renderPagination(type);
                    return pageState.pages[currentPage];
                }

                let query = db.collection(COLLECTIONS[type]).orderBy("seq", "desc");
                if (currentPage > 1) {
                    const prevLast = pageState.lastDocs[currentPage - 1];
                    if (!prevLast) {
                        currentPage = 1;
                        return loadRecords(type, false);
                    }
                    query = query.startAfter(prevLast);
                }
                const snapshot = await query.limit(PAGE_SIZE + 1).get();
                const docs = snapshot.docs;
                if (loadToken !== activeLoadToken) return [];

                if (docs.length === 0) {
                    if (currentPage > 1) currentPage--;
                    renderPagination(type);
                    return [];
                }

                const hasNextPage = docs.length > PAGE_SIZE;
                const pageDocs = hasNextPage ? docs.slice(0, PAGE_SIZE) : docs;
                const records = pageDocs.map(doc => ({ id: doc.id, ...doc.data() }));
                pageState.pages[currentPage] = records;
                pageState.lastDocs[currentPage] = pageDocs[pageDocs.length - 1] || null;
                pageState.hasNext[currentPage] = hasNextPage;
                renderRecords(records, type);
                renderPagination(type);
                return records;
            } finally {
                if (loadToken === activeLoadToken) setLoading(false);
            }
        }

        function renderRecords(records, type) {
            const list = document.getElementById("record-list");
            if (!records.length) {
                list.innerHTML = '<div class="table-wrapper"><table><tbody><tr><td>目前沒有資料</td></tr></tbody></table></div>';
                return;
            }
            const ann = type === "announcement";
            const headers = ann ? ["序號", "標題", "描述", "顯示", "有效日期"] : ["序號", "標題", "日期", "時間", "地點", "備註", "備註2", "顯示", "有效日期"];
            const rows = records.map(r => {
                const displayText = r.display === "Y" ? "顯示" : "隱藏";
                const displayClass = r.display === "Y" ? "status-visible" : "status-hidden";
                const selectedClass = selectedRecord === r.id ? "selected-row" : "";
                if (ann) {
                    return `<tr class="clickable-row ${selectedClass}" data-id="${r.id}" onclick="selectRecord('${r.id}', '${type}')"><td>${r.seq ?? ""}</td><td>${r.title ?? ""}</td><td>${r.desc ?? ""}</td><td><span class="status-pill ${displayClass}">${displayText}</span></td><td>${r.expiry_date_id ?? ""}</td></tr>`;
                }
                return `<tr class="clickable-row ${selectedClass}" data-id="${r.id}" onclick="selectRecord('${r.id}', '${type}')"><td>${r.seq ?? ""}</td><td>${r.title ?? ""}</td><td>${r.date ?? ""}</td><td>${r.time ?? ""}</td><td>${r.location ?? ""}</td><td>${r.remark ?? ""}</td><td>${r.remark2 ?? ""}</td><td><span class="status-pill ${displayClass}">${displayText}</span></td><td>${r.expiry_date_id ?? ""}</td></tr>`;
            }).join("");
            list.innerHTML = `<div class="table-wrapper"><table><thead><tr>${headers.map(h => `<th>${h}</th>`).join("")}</tr></thead><tbody>${rows}</tbody></table></div>`;
        }

        function renderPagination(type = currentType) {
            const pageState = getPaginationState(type);
            const hasNext = Boolean(pageState.hasNext[currentPage]);
            document.getElementById("pagination").innerHTML = `
                <button onclick="prevPage()" ${currentPage === 1 ? "disabled" : ""}>上一頁</button>
                <span>第 ${currentPage} 頁</span>
                <button onclick="nextPage()" ${(hasNext && !isLoading) ? "" : "disabled"}>下一頁</button>
            `;
        }

        async function prevPage() {
            if (isLoading || currentPage === 1) return;
            currentPage--;
            await loadRecords(currentType);
        }

        async function nextPage() {
            if (isLoading) return;
            const pageState = getPaginationState(currentType);
            if (!pageState.hasNext[currentPage]) return;
            currentPage++;
            await loadRecords(currentType);
        }

        async function selectRecord(id, type) {
            selectedRecord = id;
            const doc = await db.collection(COLLECTIONS[type]).doc(id).get();
            const data = doc.data() || {};
            document.getElementById("edit-title").value = data.title || "";
            if (type === "announcement") {
                document.getElementById("edit-desc-group").style.display = "block";
                document.getElementById("edit-date-group").style.display = "none";
                document.getElementById("edit-time-group").style.display = "none";
                document.getElementById("edit-location-group").style.display = "none";
                document.getElementById("edit-remark-group").style.display = "none";
                document.getElementById("edit-remark2-group").style.display = "none";
                document.getElementById("edit-desc").value = data.desc || "";
            } else {
                document.getElementById("edit-desc-group").style.display = "none";
                document.getElementById("edit-date-group").style.display = "block";
                document.getElementById("edit-time-group").style.display = "block";
                document.getElementById("edit-location-group").style.display = "block";
                document.getElementById("edit-remark-group").style.display = "block";
                document.getElementById("edit-remark2-group").style.display = "block";
                document.getElementById("edit-date").value = data.date || "";
                document.getElementById("edit-time").value = data.time || "";
                document.getElementById("edit-location").value = data.location || "";
                document.getElementById("edit-remark").value = data.remark || "";
                document.getElementById("edit-remark2").value = data.remark2 || "";
            }
            document.getElementById("edit-expire").value = data.expiry_date_id || "";
            document.getElementById("edit-display").value = data.display || "Y";
            document.getElementById("edit-form").style.display = "block";
        }

        async function saveChanges() {
            if (!selectedRecord) return;
            const type = currentType;
            const payload = {
                title: document.getElementById("edit-title").value,
                display: document.getElementById("edit-display").value,
                expiry_date_id: document.getElementById("edit-expire").value
            };
            if (type === "announcement") {
                payload.desc = document.getElementById("edit-desc").value;
            } else {
                payload.date = document.getElementById("edit-date").value;
                payload.time = document.getElementById("edit-time").value;
                payload.location = document.getElementById("edit-location").value;
                payload.remark = document.getElementById("edit-remark").value;
                payload.remark2 = document.getElementById("edit-remark2").value;
            }
            await db.collection(COLLECTIONS[type]).doc(selectedRecord).update(payload);
            alert("更新成功！");
            cancelEdit();
            resetPaginationState(type);
            await loadRecords(type, true);
        }

        function cancelEdit() {
            selectedRecord = null;
            document.getElementById("edit-form").style.display = "none";
        }
    </script>
</body>
</html>
